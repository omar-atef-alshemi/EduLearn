<body>
  <app-root></app-root>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({
    // 1. زود الوقت لـ 1500ms عشان الحركة تبان انسيابية جداً (Slow & Smooth)
    duration: 1500, 
    
    // 2. نوع الحركة: 'ease-out-cubic' بيبدأ الحركة بوضوح وينهيها بنعومة فائقة
    easing: 'ease-out-cubic', 
    
    // 3. التكرار: false عشان يفضل يشتغل وأنت طالع ونازل
    once: false, 
    
    // 4. المرآة: true ضروري لطلبك (الأنيميشن وأنت طالع)
    mirror: true, 
    
    // 5. المسافة: خليها 50 عشان الأنيميشن يبدأ بمجرد ما طرف الكارد يدخل الشاشة
    offset: 50,
    
    // 6. Anchor Placement: بيخلي الأنيميشن يتحدد مكانه بدقة بالنسبة للشاشة

    // 👈 السطر ده بيخلي الأنيميشن يتفعل بناءً على وضع العنصر بالنسبة للشاشة
  anchorPlacement: 'top-center',
    
    easing: 'ease-out-cubic'
  });
</script>
